
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>macro.</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:-apple-system; background:#0b0d17; color:white;}
.container { padding:20px; padding-bottom:100px;}
.header { font-size:28px; font-weight:600;}
.orange { color:#ff8c3a;}
.big { font-size:44px;}
.card { background:#111425; padding:15px; border-radius:16px; margin-top:15px;}
.progress { height:8px; background:#1c1f2e; border-radius:10px; overflow:hidden;}
.bar { height:8px; transition:0.3s;}
input, button { width:100%; padding:14px; margin-top:10px; border-radius:12px; border:none;}
input { background:#1c1f2e; color:white;}
button { background:#ff8c3a; color:white; font-weight:600;}
.fab { position:fixed; bottom:90px; right:20px; width:65px; height:65px; border-radius:50%; background:#ff8c3a; display:flex; align-items:center; justify-content:center; font-size:32px;}
.nav { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#0b0d17; padding:12px 0;}
.suggestion { background:#1c1f2e; padding:10px; border-radius:10px; margin-top:5px;}
.toggle { display:flex; gap:10px; margin-top:10px;}
.toggle button { flex:1; background:#1c1f2e;}
.active { background:#ff8c3a !important;}
</style>
</head>

<body>

<!-- DASHBOARD -->
<div class="container" id="today">
<div class="header">macro<span class="orange">.</span></div>

<div class="big" id="calDisplay"></div>
<div id="score"></div>

<div class="card">Protein: <span id="ptext"></span>
<div class="progress"><div id="pbar" class="bar"></div></div></div>

<div class="card">Carbs: <span id="ctext"></span>
<div class="progress"><div id="cbar" class="bar"></div></div></div>

<div class="card">Fat: <span id="ftext"></span>
<div class="progress"><div id="fbar" class="bar"></div></div></div>

<div class="card">Steps: <span id="stext"></span>
<div class="progress"><div id="sbar" class="bar"></div></div></div>

<div class="card">
<p id="suggestion"></p>
<p id="projection"></p>
<p id="streak"></p>
</div>

</div>

<!-- LOG -->
<div class="container" id="log" style="display:none;">
<div class="toggle">
<button id="foodTab" class="active" onclick="switchMode('food')">Food</button>
<button id="manualTab" onclick="switchMode('manual')">Manual</button>
</div>

<div id="foodMode">
<input id="food" oninput="suggestFood()" placeholder="type food...">
<div id="suggestions"></div>
<input id="amount" placeholder="grams" type="number">
<button onclick="addFood()">Add Food</button>
</div>

<div id="manualMode" style="display:none;">
<input id="mcal" placeholder="Calories">
<input id="mprotein" placeholder="Protein">
<input id="mcarbs" placeholder="Carbs">
<input id="mfat" placeholder="Fat">
<button onclick="addManual()">Add Macros</button>
</div>

<h4>Saved Meals</h4>
<button onclick="saveMeal()">Save Meal</button>
<div id="meals"></div>

<input id="steps" placeholder="steps">
<button onclick="saveSteps()">Save Steps</button>

<input id="weight" placeholder="weight">
<button onclick="logWeight()">Log Weight</button>

</div>

<!-- PROGRESS -->
<div class="container" id="progress" style="display:none;">
<canvas id="chart"></canvas>
</div>

<div class="fab" onclick="showTab('log')">+</div>

<div class="nav">
<div onclick="showTab('today')">Today</div>
<div onclick="showTab('log')">Log</div>
<div onclick="showTab('progress')">Progress</div>
</div>

<script>

let target = {cal:1400,p:125,c:130,f:45,steps:10000,goal:120};

let data = JSON.parse(localStorage.getItem("data")) || {
 cal:0,p:0,c:0,f:0,steps:0,weights:[],meals:[],streak:0,lastDate:null
};

// DAILY RESET
let today = new Date().toDateString();
if(data.lastDate !== today){
 data.cal=0; data.p=0; data.c=0; data.f=0; data.steps=0;
 data.streak++;
 data.lastDate=today;
}

const foods = {
 chicken:{cal:165,p:31,c:0,f:3.6},
 rice:{cal:130,p:2.7,c:28,f:0.3},
 egg:{cal:155,p:13,c:1,f:11},
 oats:{cal:389,p:17,c:66,f:7}
};

function showTab(tab){
 ["today","log","progress"].forEach(id=>{
  document.getElementById(id).style.display="none";
 });
 document.getElementById(tab).style.display="block";
}

function switchMode(mode){
 document.getElementById("foodMode").style.display = mode==="food"?"block":"none";
 document.getElementById("manualMode").style.display = mode==="manual"?"block":"none";
}

function suggestFood(){
 let input = document.getElementById("food").value.toLowerCase();
 let html="";
 for(let k in foods){
  if(k.includes(input)){
    html += `<div class="suggestion" onclick="selectFood('${k}')">${k}</div>`;
  }
 }
 document.getElementById("suggestions").innerHTML=html;
}

function selectFood(f){
 document.getElementById("food").value=f;
 document.getElementById("suggestions").innerHTML="";
}

function addFood(){
 let f=document.getElementById("food").value.toLowerCase();
 let a=document.getElementById("amount").value;
 if(foods[f]){
  data.cal+=foods[f].cal*a/100;
  data.p+=foods[f].p*a/100;
  data.c+=foods[f].c*a/100;
  data.f+=foods[f].f*a/100;
 }
 document.getElementById("food").value="";
 document.getElementById("amount").value="";
 update();
}

function addManual(){
 data.cal+=Number(mcal.value)||0;
 data.p+=Number(mprotein.value)||0;
 data.c+=Number(mcarbs.value)||0;
 data.f+=Number(mfat.value)||0;
 mcal.value=mprotein.value=mcarbs.value=mfat.value="";
 update();
}

function saveSteps(){
 data.steps=Number(steps.value)||0;
 update();
}

function logWeight(){
 data.weights.push(Number(weight.value));
 updateChart();
 update();
}

function saveMeal(){
 data.meals.push({...data});
 renderMeals();
}

function renderMeals(){
 meals.innerHTML="";
 data.meals.forEach((m,i)=>{
  meals.innerHTML += `<div class="suggestion">Meal ${i+1} <button onclick="loadMeal(${i})">Load</button></div>`;
 });
}

function loadMeal(i){
 let m=data.meals[i];
 data.cal+=m.cal; data.p+=m.p; data.c+=m.c; data.f+=m.f;
 update();
}

function update(){
 calDisplay.innerText = Math.round(data.cal)+" / "+target.cal+" kcal";
 ptext.innerText = Math.round(data.p)+" / "+target.p;
 ctext.innerText = Math.round(data.c)+" / "+target.c;
 ftext.innerText = Math.round(data.f)+" / "+target.f;
 stext.innerText = Math.round(data.steps)+" / "+target.steps;

 let pPerc=data.p/target.p*100;
 let cPerc=data.c/target.c*100;
 let fPerc=data.f/target.f*100;
 let sPerc=data.steps/target.steps*100;

 function color(el,p){
  el.style.width=p+"%";
  el.style.background=p<70?"#ff8c3a":p<100?"#4cd964":"#ff3b30";
 }

 color(pbar,pPerc); color(cbar,cPerc); color(fbar,fPerc); color(sbar,sPerc);

 // SCORE
 let scoreVal = Math.round((pPerc + cPerc + fPerc)/3);
 score.innerText = "Score: " + scoreVal + "%";

 // SUGGESTION
 suggestion.innerText = data.p<80 ? "Eat more protein" : "On track";

 // PROJECTION
 if(data.weights.length>3){
  let loss=(data.weights[0]-data.weights[data.weights.length-1])/(data.weights.length/7);
  if(loss>0){
    let weeks=(data.weights[data.weights.length-1]-target.goal)/loss;
    projection.innerText="~"+Math.round(weeks)+" weeks to goal";
  }
 }

 streak.innerText="🔥 "+data.streak+" day streak";

 localStorage.setItem("data", JSON.stringify(data));
 renderMeals();
}

const chart = new Chart(document.getElementById('chart'), {
 type:'line',
 data:{labels:[],datasets:[{label:'Weight',data:[]}]}
});

function updateChart(){
 chart.data.labels=data.weights.map((_,i)=>i+1);
 chart.data.datasets[0].data=data.weights;
 chart.update();
}

update();
updateChart();

</script>

</body>
</html>
