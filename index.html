
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { margin:0; font-family:-apple-system; background:#0b0d17; color:white;}
.container { padding:20px; padding-bottom:90px;}
.header { font-size:28px; font-weight:600;}
.orange { color:#ff8c3a;}
.big { font-size:44px;}
.progress { height:8px; background:#1c1f2e; border-radius:10px; overflow:hidden; margin:6px 0;}
.bar { height:8px; background:#ff8c3a;}
.fab { position:fixed; bottom:80px; right:20px; width:60px; height:60px; background:#ff8c3a; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px;}
.nav { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; background:#0b0d17; padding:10px 0;}
input, button { width:100%; padding:12px; margin:5px 0; border-radius:10px; border:none;}
</style>
</head>

<body>

<div class="container" id="today">
<div class="header">macro<span class="orange">.</span></div>
<div class="big" id="cal">0 kcal</div>

<div>
Protein<div class="progress"><div id="pbar" class="bar"></div></div>
Carbs<div class="progress"><div id="cbar" class="bar"></div></div>
Fat<div class="progress"><div id="fbar" class="bar"></div></div>
</div>
</div>

<div class="container" id="log" style="display:none;">
<input id="food" placeholder="food">
<input id="amt" placeholder="grams" type="number">
<button onclick="addFood()">Add Food</button>
</div>

<div class="fab" onclick="openLog()">+</div>

<div class="nav">
<div onclick="showTab('today')">Today</div>
<div onclick="showTab('log')">Log</div>
</div>

<script>
let data = {cal:0,p:0,c:0,f:0};

const db = {
 chicken:{cal:165,p:31,c:0,f:3.6},
 rice:{cal:130,p:2.7,c:28,f:0.3}
};

function openLog(){
 showTab('log');
}

function showTab(tab){
 document.getElementById("today").style.display="none";
 document.getElementById("log").style.display="none";
 document.getElementById(tab).style.display="block";
}

function addFood(){
 let f=document.getElementById("food").value.toLowerCase();
 let a=document.getElementById("amt").value;

 if(db[f]){
  data.cal += db[f].cal*a/100;
  data.p += db[f].p*a/100;
  data.c += db[f].c*a/100;
  data.f += db[f].f*a/100;
 }

 update();
}

function update(){
 document.getElementById("cal").innerText = Math.round(data.cal)+" kcal";
 document.getElementById("pbar").style.width = (data.p/120*100)+"%";
 document.getElementById("cbar").style.width = (data.c/150*100)+"%";
 document.getElementById("fbar").style.width = (data.f/50*100)+"%";
}

update();
</script>

</body>
</html>
