
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial, sans-serif; background:#f7f7f7; margin:0; padding:20px;}
.container { max-width:500px; margin:auto; background:white; padding:20px; border-radius:12px; }
input, button { width:100%; padding:10px; margin:8px 0; }
h2 { text-align:center; }
</style>
</head>
<body>
<div class="container">
<h2>Macro Tracker</h2>

<input id="food" placeholder="Enter food (e.g. chicken, rice)">
<input id="amount" type="number" placeholder="Amount (grams)">
<button onclick="addFood()">Add Food</button>

<p id="totals"></p>

<h3>Weight Log</h3>
<input id="weight" type="number" placeholder="Enter weight">
<button onclick="logWeight()">Log Weight</button>

<canvas id="chart"></canvas>
</div>

<script>
let totals = {cal:0, protein:0, carbs:0, fat:0};
let weights = [];

const db = {
  chicken:{cal:165, protein:31, carbs:0, fat:3.6},
  rice:{cal:130, protein:2.7, carbs:28, fat:0.3},
  egg:{cal:155, protein:13, carbs:1.1, fat:11},
};

function addFood(){
  let food = document.getElementById('food').value.toLowerCase();
  let amt = document.getElementById('amount').value;

  if(db[food]){
    totals.cal += db[food].cal * amt/100;
    totals.protein += db[food].protein * amt/100;
    totals.carbs += db[food].carbs * amt/100;
    totals.fat += db[food].fat * amt/100;
  }

  document.getElementById('totals').innerText =
    `Calories: ${totals.cal.toFixed(0)} | Protein: ${totals.protein.toFixed(0)}g | Carbs: ${totals.carbs.toFixed(0)}g | Fat: ${totals.fat.toFixed(0)}g`;
}

function logWeight(){
  let w = document.getElementById('weight').value;
  weights.push(w);
  chart.update();
}

const ctx = document.getElementById('chart');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Weight Progress',
      data: weights
    }]
  }
});
</script>
</body>
</html>
